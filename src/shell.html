<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}} · knowledge base</title>
    <link rel="icon" href="{{ROOT}}knowledge_base_logo.png" />
    <link rel="apple-touch-icon" href="{{ROOT}}apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="knowledge base" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="knowledge base"
      href="{{ROOT}}rss.xml"
    />
    <link rel="stylesheet" href="{{ROOT}}styles.css" />
  </head>
  <body class="{{BODYCLASS}}" data-root="{{ROOT}}">
    <header class="site-header">
      <div class="header-inner">
        <button
          type="button"
          class="menu-toggle"
          id="menuToggle"
          aria-label="Open navigation"
          aria-expanded="false"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4 5h16" />
            <path d="M4 12h16" />
            <path d="M4 19h16" />
          </svg>
        </button>
        <a class="brand" href="{{ROOT}}index.html">
          <img class="logo" src="{{ROOT}}knowledge_base_logo.png" alt="" width="26" height="26" />
          <span class="name">knowledge<span>-base</span></span>
        </a>
        <div class="breadcrumb">{{BREADCRUMB}}</div>
        <div class="header-spacer"></div>
        <button type="button" class="search" id="searchOpen" aria-label="Search notes">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m21 21-4.34-4.34" />
            <circle cx="11" cy="11" r="8" />
          </svg>
          <span>Search notes…</span>
          <span class="kbd">⌘K</span>
        </button>
      </div>
    </header>

    {{MAIN}}

    <button type="button" class="to-top" id="toTop" aria-label="Scroll to top" hidden>
      <svg
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="m18 15-6-6-6 6" />
      </svg>
    </button>

    <div class="search-modal" id="searchModal" hidden>
      <div class="search-panel" role="dialog" aria-modal="true" aria-label="Search notes">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search notes…"
          autocomplete="off"
          aria-label="Search notes"
        />
        <ul class="search-results" id="searchResults"></ul>
        <p class="search-empty" id="searchEmpty" hidden>No matches.</p>
      </div>
    </div>

    <script>
      (function () {
        var toggle = document.getElementById("menuToggle");
        var overlay = document.getElementById("overlay");
        var sidebar = document.getElementById("sidebar");
        function closeNav() {
          document.body.classList.remove("nav-open");
          if (toggle) toggle.setAttribute("aria-expanded", "false");
        }
        if (toggle) {
          toggle.addEventListener("click", function () {
            var open = document.body.classList.toggle("nav-open");
            toggle.setAttribute("aria-expanded", open ? "true" : "false");
          });
        }
        if (overlay) overlay.addEventListener("click", closeNav);
        if (sidebar)
          sidebar.addEventListener("click", function (e) {
            if (e.target.tagName === "A") closeNav();
          });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") closeNav();
        });

        var tocHead = document.querySelector(".toc-head");
        var toc = document.querySelector(".toc");
        function setToc(open) {
          if (tocHead) tocHead.setAttribute("aria-expanded", open ? "true" : "false");
        }
        if (tocHead)
          tocHead.addEventListener("click", function () {
            setToc(tocHead.getAttribute("aria-expanded") !== "true");
          });
        if (toc)
          toc.addEventListener("click", function (e) {
            if (e.target.closest("ol a")) setToc(false);
          });

        var toTop = document.getElementById("toTop");
        if (toTop) {
          var onScroll = function () {
            var doc = document.documentElement;
            var nearBottom = window.innerHeight + window.scrollY >= doc.scrollHeight - 160;
            toTop.hidden = !(window.scrollY > 320 && nearBottom);
          };
          window.addEventListener("scroll", onScroll, { passive: true });
          window.addEventListener("resize", onScroll, { passive: true });
          onScroll();
          toTop.addEventListener("click", function () {
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }
      })();
    </script>
    <script src="{{ROOT}}search.js"></script>
  </body>
</html>
